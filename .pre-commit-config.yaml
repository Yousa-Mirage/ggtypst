minimum_pre_commit_version: "3.6.0"
default_install_hook_types:
  - pre-commit
  - pre-push

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-yaml
      - id: check-toml
      - id: check-merge-conflict
      - id: check-added-large-files

  - repo: local
    hooks:
      - id: air-format
        name: air format
        entry: r-air
        args: [format, .]
        language: system
        pass_filenames: false
        stages: [pre-commit]

      - id: cargo-fmt
        name: cargo fmt
        entry: cargo
        args: [fmt, --manifest-path, src/rust/Cargo.toml]
        language: system
        pass_filenames: false
        stages: [pre-commit]

      - id: jarl-check
        name: jarl check
        entry: jarl
        args: [check, .]
        language: system
        pass_filenames: false
        stages: [pre-commit]

      - id: cargo-clippy
        name: cargo clippy
        entry: cargo
        args: [clippy, --manifest-path, src/rust/Cargo.toml]
        language: system
        pass_filenames: false
        stages: [pre-push]
